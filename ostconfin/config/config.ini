# ※ URL, 로그인 정보, 파일 경로는 config/.env 에서 관리합니다 (git 제외)
# ※ 이 파일에는 민감하지 않은 설정만 남깁니다

[SELECTORS]
# 로그인 폼 셀렉터 (개발자 도구 F12 → 요소 선택 후 확인)
# ← 실제 사이트에서 확인 후 수정 필요
id_selector = input[name="login_user_id"]
pw_selector = input[name="login_pwd"]
login_btn_selector = #btn_con_login

# 수집할 테이블 CSS 셀렉터
# 여러 테이블이 있을 경우 더 구체적인 셀렉터 사용 (예: div.content table)
# ← 실제 사이트에서 확인 후 수정 필요
table_selector = table

# 테이블 인덱스 (0부터 시작, 페이지에 테이블이 여러 개일 때 몇 번째인지)
table_index = 0

[EXCEL]
# 저장할 시트 이름
sheet_name = Sheet1

# 데이터 시작 셀 (예: A2 → 1행은 헤더 유지, 2행부터 데이터)
# ← 실제 양식 확인 후 수정 필요
start_cell = A2

# 헤더(컬럼명)도 함께 쓸지 여부 (true/false)
write_header = false

[OPTIONS]
# 브라우저를 눈에 보이게 실행할지 여부
# true: 브라우저 창이 뜸 (디버깅용), false: 백그라운드 실행
headless = false

# 페이지 로딩 최대 대기 시간 (초)
timeout = 30
