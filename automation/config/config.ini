[ERP]
# ERP 실행 파일 경로 (없으면 이미 실행 중인 창 사용)
exe_path = C:\Program Files\ERP\erp.exe
# ERP 창 제목 (작업 관리자에서 확인)
window_title = ERP

# 로그인 화면 컨트롤 이름 (Inspect.exe 또는 Spy++로 확인)
login_id_control = txtUserId
login_pw_control = txtPassword
login_btn_control = btnLogin

# 조회 화면 이동 후 기준월 입력 컨트롤 이름
month_input_control = txtYearMonth
search_btn_control = btnSearch

# 항목 목록이 표시되는 그리드/리스트 컨트롤 이름
item_list_control = gridItems

# 다운로드 버튼 컨트롤 이름
download_btn_control = btnExcelDownload

[PATHS]
# 엑셀 다운로드 기본 폴더
download_dir = C:\Users\Osstem\Downloads

# 원본 양식(템플릿) 파일 경로
# ← 실제 경로로 변경 필요
template_path = automation\templates\allowance_template.xlsx

# 결과 파일 저장 폴더
output_dir = automation\data\output

# 원본 다운로드 보관 폴더
raw_dir = automation\data\raw

# 중간 처리 결과 폴더
intermediate_dir = automation\data\intermediate

[EXCEL_MAPPING]
# 다운로드 엑셀에서 실제 헤더가 시작하는 행 번호 (1부터 시작)
# ERP 엑셀에 상단 제목행이 몇 줄 있는지 확인 후 수정
header_row = 1

# 불필요한 컬럼 (쉼표로 구분) - 필요 없는 컬럼명 입력
# 예: 비고,순번
skip_columns =

# 합계 행을 식별하는 키워드 (해당 값이 있는 행은 제거)
total_row_keyword = 합계

[TEMPLATE]
# 양식에서 데이터를 붙여넣기 시작할 시트명
sheet_name = Sheet1

# 데이터를 붙여넣기 시작할 셀 위치 (예: B3)
# ← 실제 양식 확인 후 변경 필요
start_cell = A2

[LOGGING]
# 로그 레벨: DEBUG, INFO, WARNING, ERROR
level = INFO
# 로그 파일 저장 폴더
log_dir = automation\logs
