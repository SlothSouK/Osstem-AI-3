[PATHS]
output_dir = vercheck\data\output

[EXCEL]
# 헤더 탐지 스캔 최대 행 수
header_scan_rows = 15
# 헤더로 인정하기 위한 최소 비공백 셀 비율 (0~1)
header_min_fill_ratio = 0.3
# 행 키 컬럼명 (쉼표 구분, 복합키 가능). 공백이면 자동 탐지
key_columns =
# 숫자 변경 무시 임계값 (부동소수점 노이즈 방지)
numeric_tolerance = 0.0001
# 비교 제외 시트명 (쉼표 구분)
skip_sheets =

[REPORT]
summary_sheet_name  = 요약
changes_sheet_name  = 변경내역
detail_sheet_prefix = 비교_

[LOGGING]
level   = INFO
log_dir = vercheck\logs
